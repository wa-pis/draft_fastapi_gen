databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: ai-platform
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: varchar(64)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false

        - createIndex:
            tableName: users
            indexName: idx_users_email
            unique: true
            columns:
              - column:
                  name: email

  - changeSet:
      id: 002-create-outbox-events
      author: ai-platform
      changes:
        - createTable:
            tableName: outbox_events
            columns:
              - column:
                  name: id
                  type: bigserial
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: aggregate_type
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_id
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: jsonb
                  constraints:
                    nullable: false
              - column:
                  name: headers
                  type: jsonb
                  constraints:
                    nullable: false
              - column:
                  name: occurred_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: published_at
                  type: timestamp with time zone
                  constraints:
                    nullable: true
              - column:
                  name: status
                  type: varchar(32)
                  defaultValue: pending
                  constraints:
                    nullable: false
              - column:
                  name: error
                  type: text
                  constraints:
                    nullable: true
              - column:
                  name: attempt_count
                  type: integer
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: next_attempt_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createIndex:
            tableName: outbox_events
            indexName: idx_outbox_pending
            columns:
              - column:
                  name: status
              - column:
                  name: next_attempt_at
              - column:
                  name: id
