databaseChangeLog:
  - changeSet:
      id: 003-add-unique-users-email
      author: ai-platform
      changes:
        - dropIndex:
            tableName: users
            indexName: idx_users_email
        - addUniqueConstraint:
            tableName: users
            columnNames: email
            constraintName: uq_users_email

  - changeSet:
      id: 004-add-outbox-retry-fields
      author: ai-platform
      changes:
        - addColumn:
            tableName: outbox_events
            columns:
              - column:
                  name: attempt_count
                  type: integer
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: next_attempt_at
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            tableName: outbox_events
            indexName: idx_outbox_retry
            columns:
              - column:
                  name: status
              - column:
                  name: next_attempt_at
              - column:
                  name: id
